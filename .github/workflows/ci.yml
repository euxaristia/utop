name: Rust CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: utop-linux
            binary: target/release/utop
          - os: macos-latest
            artifact: utop-macos
            binary: target/release/utop
          - os: windows-latest
            artifact: utop-windows
            binary: target/release/utop.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release

    - name: Run tests
      run: cargo test

    - name: Check binary exists (Unix)
      if: runner.os != 'Windows'
      run: |
        test -x ${{ matrix.binary }}
        file ${{ matrix.binary }}

    - name: Check binary exists (Windows)
      if: runner.os == 'Windows'
      run: |
        if (!(Test-Path "${{ matrix.binary }}")) { throw "Binary not found" }
        Get-Item "${{ matrix.binary }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.binary }}
        retention-days: 14
