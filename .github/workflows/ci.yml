name: Rust CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: utop-linux
            binary: target/release/utop
          - os: macos-latest
            artifact: utop-macos
            binary: target/release/utop
          - os: windows-latest
            artifact: utop-windows
            binary: target/release/utop.exe

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

    - name: Cache cargo registry
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --release

    - name: Run tests
      run: cargo test

    - name: Check binary exists (Unix)
      if: runner.os != 'Windows'
      run: |
        test -x ${{ matrix.binary }}
        file ${{ matrix.binary }}

    - name: Check binary exists (Windows)
      if: runner.os == 'Windows'
      run: |
        if (!(Test-Path "${{ matrix.binary }}")) { throw "Binary not found" }
        Get-Item "${{ matrix.binary }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.binary }}
        retention-days: 14
